version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
        BUILD_NUMBER: ${BUILD_NUMBER:-1}
        GIT_HASH: ${GIT_HASH:-unknown}
        BUILD_DATE: ${BUILD_DATE:-2026-03-07}
    container_name: aweh-backoffice-gateway
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_PATH: ${DB_PATH}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT:-8081}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DOWNLOAD_BASE_URL: ${DOWNLOAD_BASE_URL:-https://updates.aweh.pos/releases}
    volumes:
      - ./migrations:/app/migrations:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/api/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
